name: Public Repo Safety

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Block Terraform state and local value files
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files | grep -E '(^|/)(\.terraform|\.alzlib)/|\.tfstate(\.|$)|\.tfplan$|(^|/)terraform\.tfvars$|\.pem$|\.pfx$|\.p12$|\.key$'; then
            echo "Sensitive local Terraform or credential files must not be committed."
            exit 1
          fi
