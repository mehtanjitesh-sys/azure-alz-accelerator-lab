name: Terraform ALZ

on:
  pull_request:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: environments/alz-platform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Ensure ALZ library cache is not committed
        run: |
          if git ls-files | grep -E -q '(^|/)\.alzlib/'; then
            echo ".alzlib must not be committed"
            exit 1
          fi

      - name: Azure login with OIDC
        if: github.event_name == 'workflow_dispatch'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_PLATFORM_SUBSCRIPTION_ID }}

      - name: Terraform init
        if: github.event_name == 'workflow_dispatch'
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -backend-config="key=alz-platform.tfstate"

      - name: Terraform format
        run: terraform fmt -recursive -check

      - name: Terraform validate
        if: github.event_name == 'workflow_dispatch'
        run: terraform validate

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: environments/alz-platform
          quiet: true
          soft_fail: true

      - name: Terraform plan
        if: github.event_name == 'workflow_dispatch'
        id: plan
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan
          exit_code=$?
          if [ "$exit_code" -eq 1 ]; then
            exit 1
          fi
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

      - name: Upload plan artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: alz-platform-tfplan
          path: environments/alz-platform/tfplan

  apply:
    if: github.event_name == 'workflow_dispatch'
    needs: plan
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: environments/alz-platform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Download approved plan artifact
        uses: actions/download-artifact@v4
        with:
          name: alz-platform-tfplan
          path: environments/alz-platform

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_PLATFORM_SUBSCRIPTION_ID }}

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -backend-config="key=alz-platform.tfstate"

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan
