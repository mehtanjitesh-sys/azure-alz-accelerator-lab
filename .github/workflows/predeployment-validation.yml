name: Predeployment Validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: environments/alz-platform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -recursive -check

      - name: Terraform init without backend
        run: terraform init -backend=false -upgrade

      - name: Terraform validate
        run: terraform validate

      - name: Create validation evidence summary
        if: always()
        run: |
          mkdir -p ../../evidence/generated
          {
            echo "# Predeployment Validation Evidence"
            echo
            echo "- Repository: $GITHUB_REPOSITORY"
            echo "- Workflow: $GITHUB_WORKFLOW"
            echo "- Run ID: $GITHUB_RUN_ID"
            echo "- Commit: $GITHUB_SHA"
            echo "- Terraform fmt: executed"
            echo "- Terraform init without backend: executed"
            echo "- Terraform validate: executed"
            echo
            echo "This validates syntax and module/provider wiring. It does not prove Azure deployment success."
          } > ../../evidence/generated/predeployment-validation.md

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alz-predeployment-validation
          path: evidence/generated/predeployment-validation.md
